<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nobita AI OS</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #1e293b;
            border-radius: 10px;
            background: #111827;
            margin-bottom: 20px;
        }
        .message {
            margin: 15px 0;
            padding: 12px 16px;
            border-radius: 8px;
            /* Yahan font size bada kiya hai takki saaf padha ja sake */
            font-size: 18px; 
            line-height: 1.6;
        }
        .user {
            background-color: #1e40af;
            align-self: flex-end;
            color: #white;
        }
        .ai {
            background-color: #1f2937;
            border-left: 4px solid #3b82f6;
            color: #f3f4f6; /* Bright text color */
        }
        #input-container {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #374151;
            background: #1f2937;
            color: white;
            font-size: 16px;
        }
        button {
            padding: 15px 25px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #3b82f6; letter-spacing: 2px;">NOBITA AI OS</h2>
    
    <div id="chat-container" id="chatBox">
        <div class="message ai">System Online. Hello Boss, I am Nobita AI.</div>
    </div>

    <div id="input-container">
        <input type="text" id="userInput" placeholder="Type here Boss...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Yahan humne AI ka dimaag ekdum set kar diya hai
        const systemPrompt = "You are Nobita AI, a highly intelligent, polite, and loyal AI assistant created by your Boss (SAMAD). Always speak in clean, natural, and easy-to-understand Hinglish/Hindi. Avoid broken words, weird translation artifacts, or robotic language. Treat the user as your respected Boss and friend.";

        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const chatContainer = document.getElementById('chat-container');
            const text = inputField.value.trim();
            
            if(!text) return;

            // User message show karo
            chatContainer.innerHTML += `<div class="message user"><b>You:</b> ${text}</div>`;
            inputField.value = '';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                // Pollinations API with clean text settings
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?system=${encodeURIComponent(systemPrompt)}&private=true`);
                
                if (!response.ok) throw new Error('Network error');
                
                const reply = await response.text();
                
                // AI message show karo (Clean font size ke sath)
                chatContainer.innerHTML += `<div class="message ai"><b>Nobita AI:</b> ${reply}</div>`;
                chatContainer.scrollTop = chatContainer.scrollHeight;

                // Agar voice feature active hai toh yahan voice code automatic trigger hoga
                speak(reply);

            } catch (error) {
                chatContainer.innerHTML += `<div class="message ai" style="color: #ef4444;"><b>Error:</b> Connection temporarily lost. Retrying...</div>`;
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                // Pehle se chal rahi voice ko stop karo
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hi-IN'; // Hindi voice
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }
    </script>
</body>
</html>
